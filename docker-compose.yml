# Dev stack for the LH-Radiology system.
#
# EHR/RIS is the OpenMRS 3 (o3) reference-application BACKEND with legacyui + the
# LibreHealth Radiology module baked in (built from the sibling lh-radiology repo,
# o3 branch, docker/o3/Dockerfile). The o3 backend image is arm64-native, so it runs
# natively on Apple Silicon (the old amd64 RefApp distro did not). Radiology UI is the
# legacy JSP UI served by legacyui at /openmrs/... — there is no SPA/gateway in scope.
#
# Bring up the RIS stack:   docker compose up -d mariadb openmrs orthanc ohif
#   OpenMRS (legacyui):     http://localhost:8080/openmrs/   (admin / Admin123)
#   Orthanc:                http://localhost:8042/
#   OHIF viewer:            http://localhost:3000/
# Temporal services below are for the agent orchestrator (independent of the RIS stack).
#
# Distributed tracing (#28) is OPT-IN and off by default — with OTEL_EXPORTER_OTLP_ENDPOINT
# unset, every service's tracing gate is False and no OTel code runs at all. To turn it on:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318 docker compose --profile otel up -d
#   Jaeger UI:              http://localhost:16686/   (one trace per study, across all agents)

# Injected into every app service. Empty by default => tracing fully off (see tracing_enabled()).
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

services:
  # --- EHR / RIS: OpenMRS 3 backend + legacyui + lh-radiology --------------------
  openmrs:
    # o3 reference-application backend with the LibreHealth Radiology module baked in.
    # HOW OTHER DEVS GET THIS IMAGE: the lh-radiology CI builds docker/o3/Dockerfile and pushes
    # it to the project's PUBLIC GitLab Container Registry on every o3-branch pipeline, so you
    # do NOT need the lh-radiology source to run the stack — `docker compose up` pulls it.
    #   Published image (per branch):
    #     registry.gitlab.com/librehealth/radiology/lh-radiology/o3:o3   (docker pull, no auth)
    #   Build from source instead (module developers): clone lh-radiology on the o3 branch as a
    #   sibling of this repo, then `docker compose build openmrs` (uses the build: block below).
    image: registry.gitlab.com/librehealth/radiology/lh-radiology/o3:o3
    pull_policy: missing                  # `up` pulls the published image; build only on `compose build`
    build:
      context: ../lh-radiology            # sibling checkout of lh-radiology (o3 branch)
      dockerfile: docker/o3/Dockerfile
    ports: ["8080:8080"]
    environment:
      # o3 backend startup.sh reads OMRS_* (see startup-init.sh). Use the mariadb
      # JDBC driver (bundled in the war) against the mariadb service below.
      OMRS_DB: mariadb
      OMRS_DB_HOSTNAME: mariadb
      OMRS_DB_PORT: "3306"
      OMRS_DB_NAME: openmrs
      OMRS_DB_USERNAME: openmrs         # NOTE: OMRS_DB_USERNAME (not OMRS_DB_USER)
      OMRS_DB_PASSWORD: openmrs
      OMRS_CREATE_TABLES: "true"        # first boot: build the schema
      OMRS_AUTO_UPDATE_DATABASE: "true" # run Liquibase migrations on boot
      OMRS_ADMIN_USER_PASSWORD: Admin123
      OMRS_MODULE_WEB_ADMIN: "true"
      # OMRS_SEARCH defaults to 'lucene' -> no Elasticsearch dependency.
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs/ws/rest/v1/session"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 180s     # first boot runs Liquibase + starts every module

  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: openmrs
      MARIADB_DATABASE: openmrs
      MARIADB_USER: openmrs
      MARIADB_PASSWORD: openmrs
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes: ["mariadb-data:/var/lib/mysql"]

  # --- PACS ---------------------------------------------------------------------
  # SQLite-backed Orthanc with DICOMweb enabled for OHIF, and the OnStableStudy
  # Python plugin wired at /etc/orthanc/orthanc_stable_study.py. The orthancteam
  # image ships the Python plugin (v7.1) built-in and auto-enables it as soon as
  # a PythonScript setting is present in the config (docker/orthanc/orthanc.json).
  orthanc:
    image: orthancteam/orthanc:latest   # TODO: pin a version
    ports: ["8042:8042", "4242:4242"]
    environment:
      # Where the plugin POSTs the OrthancStableStudyEvent. Must be http(s);
      # the plugin refuses non-http(s) URLs at runtime (Bandit B310 / CWE-939).
      ORCH_WEBHOOK_URL: http://orchestrator:8090/webhooks/orthanc
    volumes:
      - orthanc-db:/var/lib/orthanc/db
      - ./docker/orthanc/orthanc.json:/etc/orthanc/lh-radiology.json:ro
      # The plugin file is mounted read-only; edits happen via git + `docker compose restart orthanc`.
      - ./integrations/orthanc-plugin/orthanc_stable_study.py:/etc/orthanc/orthanc_stable_study.py:ro
    restart: unless-stopped
    # NOTE on ordering: orthanc does NOT depends_on orchestrator (would cycle with the
    # orchestrator -> orthanc dependency below). The plugin's `_post` swallows exceptions
    # and orthanc.LogError()s, so early webhooks that arrive before the orchestrator is
    # up are logged and dropped. StableAge (60s default) makes an early race unlikely.

  # --- Viewer -------------------------------------------------------------------
  # OHIF viewer with our worklist extension baked in (issue #21).
  # Built from integrations/ohif-extension/Dockerfile: multi-stage build that
  # fetches OHIF Viewers at the exact commit pinned by OHIF_REF (there is no
  # v3.6.5 git tag upstream, so we pin a release/3.6 commit), drops our
  # extension package under extensions/, registers it in pluginConfig.json,
  # runs the OHIF webpack build, then serves the dist/ from nginx. NOT a
  # fork -- we consume OHIF at a pinned commit and add our plugin alongside;
  # version bumps are a single-line change to the Dockerfile's OHIF_REF arg.
  #
  # nginx also proxies /reading-api/* -> worklist-api and /orchestrator-api/*
  # -> ingress so the browser stays same-origin (no CORS on either service).
  ohif:
    build:
      context: .
      dockerfile: integrations/ohif-extension/Dockerfile
    ports: ["3000:80"]
    volumes:
      - ./docker/ohif/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on: [orthanc, worklist-api]
    restart: unless-stopped

  # --- Temporal (durable orchestration engine, for the agent system) ------------
  temporal:
    image: temporalio/auto-setup:1.24.2   # TODO: pin to your target Temporal version
    ports: ["7233:7233"]
    environment:
      DB: postgres12
      DB_PORT: 5432                  # REQUIRED: auto-setup defaults DB_PORT to 3306 (MySQL); Postgres is 5432
      POSTGRES_SEEDS: temporal-postgresql
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
    depends_on: [temporal-postgresql]

  temporal-postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes: ["temporal-pg-data:/var/lib/postgresql/data"]

  temporal-ui:
    image: temporalio/ui:2.30.1           # TODO: pin
    ports: ["8088:8080"]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on: [temporal]

  # --- Comms ledger (#52): the Communications Agent's write store -----------------
  # A SEPARATE FHIR server, on purpose. The Communications Agent must durably record "we told
  # someone" (Communication) and "did they acknowledge?" (Task, with the ack deadline on
  # restriction.period), and look up who is on call (PractitionerRole). OpenMRS fhir2 implements
  # NONE of those, and the locked decision keeps it a read-only source of clinical context — so
  # these writes land here instead. fhir2 is still the only source of clinical truth: a report's
  # content is always read from fhir2, never copied into this ledger. See
  # libs/radagent-common/radagent_common/comms_ledger.py.
  #
  # H2 in-memory by default (hapi.fhir.* defaults): fine for the dev stack, wiped on `down`. A
  # deployment points HAPI at a real database — this is a clinical-communication audit trail.
  comms-ledger:
    image: hapiproject/hapi:v7.4.0
    ports: ["8108:8080"]
    environment:
      # R4 to match every other FHIR surface in the stack (fhir2 is R4).
      hapi.fhir.fhir_version: R4
      # The agent creates Communication/Task with server-assigned ids, and seeds the on-call
      # directory by PUTting Practitioner/PractitionerRole at known ids.
      hapi.fhir.allow_external_references: "true"
      # The ledger deliberately holds RELATIVE references to resources that live in fhir2, not here:
      # Communication.subject and Task.for point at Patient/*, and basedOn/about point at
      # ServiceRequest/*. Those must NOT exist in the ledger (fhir2 is the only source of clinical
      # truth, never copied in). Two things break without this:
      #   1. HAPI enforces referential integrity on write by default and rejects such a reference
      #      with HTTP 400 (HAPI-1094 "Resource Patient/... not found"), so every ledger write fails.
      #   2. Even with integrity off, HAPI does not INDEX a reference whose target is absent, so
      #      search_communications by based-on/subject silently returns nothing (a lost audit trail).
      # Auto-creating an empty placeholder target (no clinical content, just a typed id) fixes both:
      # the write passes integrity and the reference indexes, so the audit-by-order search works.
      # Verified end-to-end against this HAPI image (create + for-alias + read-modify-write +
      # search-by-based-on + audit join, all green).
      hapi.fhir.auto_create_placeholder_reference_targets: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # --- Tracing backend (#28), opt-in: `docker compose --profile otel up` -----------
  # Jaeger all-in-one = OTLP receiver + storage + UI in one container. It only starts under the
  # `otel` profile, so the default stack is byte-for-byte unchanged. 4318 = OTLP/HTTP, which is
  # what init_tracing()'s exporter speaks (opentelemetry.exporter.otlp.proto.http).
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: ["otel"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP/HTTP receiver

  # --- Application services (M1) -------------------------------------------------
  orchestrator:
    build: { context: ., dockerfile: orchestrator/Dockerfile }
    # `wait -n` exits when either the worker or the ingress dies, so `restart` recovers the
    # container. worker.py retries the Temporal connect while temporal is still booting.
    command: ["bash", "-c", "python -m orchestrator.worker & uvicorn orchestrator.ingress:app --host 0.0.0.0 --port 8090 & wait -n"]
    restart: unless-stopped
    environment:
      <<: *otel-env
      TEMPORAL_TARGET: temporal:7233
      FHIR2_BASE_URL: http://openmrs:8080/openmrs/ws/fhir2/R4
      # Live fhir2 401s unauthenticated reads and the callers swallow fhir2 errors by design,
      # so missing credentials fail SILENTLY (#53). Dev-stack values = the o3 admin account.
      FHIR2_BASIC_USER: admin
      FHIR2_BASIC_PASS: Admin123
      # Pre-sign impression draft (#26) codes its DiagnosticReport with a real OpenMRS Concept
      # (fhir2 rejects a text-only code with codeRequired). Defaults in-code to the CIEL
      # "Provisional diagnosis" concept; set FHIR2_PRESIGN_REPORT_CONCEPT to a deployment's own
      # radiology-report concept UUID to override.
      ORTHANC_BASE_URL: http://orthanc:8042
      # Worklist API where publish_priority_activity sends triage priority (issue #20 follow-up).
      # Best-effort: a Worklist API outage does not fail the workflow (see worklist_client.py).
      WORKLIST_API_URL: http://worklist-api:8107
    ports: ["8090:8090"]
    depends_on: [temporal, openmrs, orthanc]

  worklist-triage:
    build: { context: ., dockerfile: agents/worklist-triage/Dockerfile }
    ports: ["8101:8101"]
    environment:
      <<: *otel-env
  # ehr-assistant does live fhir2 reads (#4) — patient labs, problems, allergies, meds — so it
  # needs the same credentials as the orchestrator (#53); without them every read 401s and the
  # whole EHR context packet silently degrades to empty.
  ehr-assistant:
    build: { context: ., dockerfile: agents/ehr-assistant/Dockerfile }
    ports: ["8102:8102"]
    environment:
      <<: *otel-env
      FHIR2_BASIC_USER: admin
      FHIR2_BASIC_PASS: Admin123
  interpretation-assistant:
    build: { context: ., dockerfile: agents/interpretation-assistant/Dockerfile }
    ports: ["8103:8103"]
    environment:
      <<: *otel-env
  # impression-generation reads report conclusions from live fhir2 (#16), so it needs the same
  # credentials as the orchestrator (#53) — without them every fetch 401s and silently degrades
  # to "no critical detection".
  impression-generation:
    build: { context: ., dockerfile: agents/impression-generation/Dockerfile }
    ports: ["8104:8104"]
    environment:
      <<: *otel-env
      FHIR2_BASIC_USER: admin
      FHIR2_BASIC_PASS: Admin123
  # report-verification reads the finalized report's conclusion from live fhir2 (#22) to parse
  # report.body (laterality, sections, BI-RADS, density) for the PI rules — same credentials as
  # impression-generation; without them every fetch 401s and the body rules silently stay inert.
  report-verification:
    build: { context: ., dockerfile: agents/report-verification/Dockerfile }
    ports: ["8105:8105"]
    environment:
      <<: *otel-env
      FHIR2_BASIC_USER: admin
      FHIR2_BASIC_PASS: Admin123
  # Worklist API (issue #20): serves OHIF a sorted reading worklist by joining Orthanc completed
  # studies + orchestrator triage priority + LH-Radiology assignment (read-only). Priority arrives
  # via POST /priority from orchestrator/activities.publish_priority_activity (wiring lives in
  # Pranathi's file - separate follow-up). SQLite priority store is volume-mounted for durability
  # across restart, mirroring the ingress_store pattern in orchestrator/.
  worklist-api:
    build: { context: ., dockerfile: integrations/worklist-api/Dockerfile }
    ports: ["8107:8107"]
    environment:
      ORTHANC_BASE_URL: http://orthanc:8042
      WORKLIST_STORE_PATH: /var/lib/lhrad/worklist.sqlite
    volumes:
      - worklist-api-db:/var/lib/lhrad
    depends_on: [orthanc]
    restart: unless-stopped
  # NOTE: the Communications Agent (existing, A2A + FastAPI) joins here as `communications:8106`
  # (external image, added when it runs).

volumes:
  mariadb-data:
  orthanc-db:
  temporal-pg-data:
  worklist-api-db:
