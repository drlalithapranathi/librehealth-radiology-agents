id: laterality-consistency
severity: WARN
description: >
  Body-text laterality must match the impression laterality. Fires when they disagree.
  (Activates fully once report-body parsing lands in M2; harmless no-op until then.)
when:
  field: report.body.laterality
  op: not_equals
  ref: impression.structuredFindings.0.laterality
message: "Laterality mismatch: body says {field} but impression says {ref}"
location: impression
