# nginx server block for the OHIF viewer container.
# The stock ohif/app image ships an EMPTY conf.d and a 0-byte app-config.js, so we
# provide both. Serving OHIF and proxying Orthanc's DICOMweb through the SAME origin
# means the browser never makes a cross-origin request — no Orthanc CORS needed.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # The OHIF image ships its JS/CSS bundles PRE-COMPRESSED: the plain files (e.g.
    # app.bundle.<hash>.js) are 0-byte placeholders and the real content lives in the
    # matching *.gz. Without gzip_static, nginx serves the empty placeholder and the
    # React app never boots (blank iframe). gzip_static serves the .gz for the .js request.
    gzip_static on;

    # NOTE on the service worker: OHIF's own init-service-worker.js already unregisters any
    # existing SW and, crucially, only (re)registers sw.js when the host is NOT localhost/127
    # (isNotLocalDevelopment). So on this localhost dev stack OHIF runs with NO service worker
    # and no PWA caching — nothing extra to do here. (An earlier custom override that force-
    # unregistered on every load caused a reload loop / black screen and has been removed.)

    # SPA fallback so deep links resolve to the OHIF app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # DICOMweb (QIDO-RS / WADO-RS) -> Orthanc, same-origin.
    location /dicom-web/ {
        proxy_pass http://orthanc:8042/dicom-web/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WADO-URI -> Orthanc.
    location /wado {
        proxy_pass http://orthanc:8042/wado;
        proxy_set_header Host $host;
    }

    # Reading worklist API -> Worklist API service (issue #21). Same-origin so
    # our OHIF extension's WorkList component can fetch /reading-api/worklist
    # without any CORS setup on the API side.
    location /reading-api/ {
        proxy_pass http://worklist-api:8107/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Orchestrator ingress -> where the OHIF extension WILL POST StudyOpenedEvent
    # once the receiving endpoint is wired. The orchestrator's ohif-opened ingest
    # surface is flagged as a small follow-up in docs/ohif-integration-approach.md
    # (parallel to orthanc_webhook in orchestrator/ingress.py). Uncomment this
    # block in that follow-up MR — until then, the extension's best-effort POST
    # would 404 (fine, non-blocking by design) but nginx CRASHES at startup if
    # this block references an unresolvable host on the compose network.
    #
    # location /orchestrator-api/ {
    #     proxy_pass http://ingress:8090/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
