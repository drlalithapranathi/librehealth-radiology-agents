# nginx server block for the OHIF viewer container.
# Serves the OHIF build produced by integrations/ohif-extension/Dockerfile
# (nginx:alpine base has no default OHIF conf, so we provide one), and
# proxies /dicom-web, /wado, /reading-api, and /orchestrator-api through
# the same origin so the browser never makes a cross-origin request --
# no CORS setup needed on Orthanc, worklist-api, or the orchestrator.
#
# Since #21 we own the OHIF image build. Two changes to this file in the
# #21 follow-up MR:
#
# 1. Removed `gzip_static on;`. The stock ohif/app image shipped bundles
#    as 0-byte placeholders with content in matching .gz files, so
#    gzip_static was mandatory to serve real content. OHIF's own webpack
#    config (fetched from the pinned commit) has no CompressionPlugin,
#    so `yarn build` inside our Dockerfile produces normal-sized assets
#    and gzip_static was a silent no-op.
#
# 2. Added COOP + COEP headers below to enable cross-origin isolation,
#    which is a browser prerequisite for SharedArrayBuffer. Cornerstone3D's
#    WASM codec worker uses SharedArrayBuffer for zero-copy pixel-buffer
#    sharing between the worker and main thread; without cross-origin
#    isolation Chrome (and every modern browser) refuses to expose
#    SharedArrayBuffer at all, the codec worker throws
#    `ReferenceError: SharedArrayBuffer is not defined` on first
#    frame decode, and the viewer stays black even for well-formed
#    DICOMs. This was the actual cause of the CT_small black-viewport
#    reported in #21's known follow-up section, not the __filename shim.
#
#    We use `credentialless` rather than `require-corp` for COEP because
#    OHIF's HTML loads Google Fonts CSS from fonts.googleapis.com, and
#    require-corp would block any cross-origin resource lacking a
#    Cross-Origin-Resource-Policy header. credentialless is the more
#    permissive variant (Chrome 96+, Firefox 116+): it allows cross-origin
#    resources without CORP headers by fetching them without credentials.
#    All the cross-origin resources OHIF pulls (Google Fonts, CDN scripts)
#    are public/uncredentialed so this is safe.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation for SharedArrayBuffer. See long note above.
    # Applied at server level so every response (HTML, JS, WASM, CSS,
    # workers) carries the headers; the top-level document needs them to
    # enter isolation, and every subresource served under the isolated
    # document benefits.
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy credentialless always;

    # NOTE on the service worker: OHIF's own init-service-worker.js already unregisters any
    # existing SW and, crucially, only (re)registers sw.js when the host is NOT localhost/127
    # (isNotLocalDevelopment). So on this localhost dev stack OHIF runs with NO service worker
    # and no PWA caching -- nothing extra to do here. (An earlier custom override that force-
    # unregistered on every load caused a reload loop / black screen and has been removed.)

    # SPA fallback so deep links resolve to the OHIF app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # DICOMweb (QIDO-RS / WADO-RS) -> Orthanc, same-origin.
    location /dicom-web/ {
        proxy_pass http://orthanc:8042/dicom-web/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WADO-URI -> Orthanc.
    location /wado {
        proxy_pass http://orthanc:8042/wado;
        proxy_set_header Host $host;
    }

    # Reading worklist API -> Worklist API service (issue #21). Same-origin so
    # our OHIF extension's WorkList component can fetch /reading-api/worklist
    # without any CORS setup on the API side.
    location /reading-api/ {
        proxy_pass http://worklist-api:8107/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Orchestrator ingress -> the OHIF extension POSTs StudyOpenedEvent here on
    # study open (see integrations/ohif-extension/src/api/eventClient.ts). Wired
    # as part of #73 item 1; the receiving endpoint is @app.post("/events/ohif-opened")
    # in orchestrator/ingress.py.
    location /orchestrator-api/ {
        proxy_pass http://orchestrator:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
